services:
  backend:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    volumes:
      - ./data:/app/data # sqlite + persisted OAuth token live here
    ports:
      - '3030:3030'

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on: [backend]
    ports:
      - '8088:80' # nginx serves the SPA, proxies /api -> backend
