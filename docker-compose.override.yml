services:
  backend:
    build:
      context: ./backend
      target: build
    command: npm run dev
    volumes:
      - ./backend/src:/app/src
      - ./data:/app/data
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true

  frontend:
    build:
      context: ./frontend
      target: build
    command: npm run dev -- --host
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - '5173:5173'
